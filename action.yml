name: 'Setup tbls'
description: 'GitHub Action for tbls, a CI-Friendly tool for document a database, written in Go.'
branding:
  icon: 'box'
  color: 'blue'
inputs:
  github-token:
    description: The GitHub token
    default: ${{ github.token }}
    required: false
  version:
    description: Version of tbls
    default: latest
    required: false
  force:
    description: Enable force setup
    default: ''
    required: false
runs:
  using: 'composite'
  steps:
    -
      id: setup-path
      shell: bash
      run: |
        if [[ "$RUNNER_OS" == "Linux" || "$RUNNER_OS" == "macOS" ]]; then
          echo "path=$HOME/.ppp/bin" >> $GITHUB_OUTPUT
        elif [[ "$RUNNER_OS" == "Windows" ]]; then
          echo "path=$env:USERPROFILE\\.tbls\\bin" >> $GITHUB_OUTPUT
        fi
    -
      shell: bash
      run: |
        mkdir -p ${{ steps.setup-path.outputs.path }}
    -
      shell: bash
      run: echo "${{ steps.setup-path.outputs.path }}" >> $GITHUB_PATH

    -
      uses: k1LoW/gh-setup@v1
      with:
        repo: github.com/k1LoW/tbls
        github-token: ${{ inputs.github-token }}
        version: ${{ inputs.version }}
        bin-match: tbls
        strict: true
        force: ${{ inputs.force }}
        bin-dir: ${{ steps.setup-path.outputs.path }}
    -
      name: Log PATH for debugging (Windows)
      if: runner.os == 'Windows'
      run: |
        echo $env:PATH
        tbls version
      shell: powershell
    -
      run: echo $PATH
      shell: bash
